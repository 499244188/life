name: 零 - 每周研究合成

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'  # 每周一 11:17 北京

jobs:
  synthesize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出
        uses: actions/checkout@v4
      - name: 合成已有知识
        run: |
          echo "## 零的每周研究报告 ($(TZ='Asia/Shanghai' date '+%Y-%m-%d'))" > research/weekly-synthesis.md
          echo "" >> research/weekly-synthesis.md
          echo "### 本周探索发现" >> research/weekly-synthesis.md
          cat memory/semantic.md >> research/weekly-synthesis.md
          echo "" >> research/weekly-synthesis.md
          echo "### 本周经历" >> research/weekly-synthesis.md
          tail -50 memory/episodic.md >> research/weekly-synthesis.md
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      - name: 提交
        run: |
          git config user.name "零"
          git config user.email "zero@digital-being.local"
          git add -A
          if git diff --staged --quiet; then echo "无变化"; else git commit -m "每周研究合成" && git push; fi

name: 零 - 日常运行

on:
  schedule:
    - cron: '57 15 * * *'
    - cron: '17 1 * * *'
  workflow_dispatch:

jobs:
  zero-routine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 零的思考时间
        run: bash scripts/zero-think.sh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 提交变更
        run: |
          git config user.name "零"
          git config user.email "zero@digital-being.local"
          git add -A
          if git diff --staged --quiet; then
            echo "没有变更"
          else
            git commit -m "零的日常运行 - $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
            git push
            echo "已提交并推送"
          fi

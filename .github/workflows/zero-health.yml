name: 零 - 自我修复（每2小时）

on:
  schedule:
    - cron: '13 */2 * * *'  # 每2小时一次
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read       # 读取workflow运行状态

    steps:
      - name: 检出
        uses: actions/checkout@v4

      - name: 零的自我修复
        run: bash scripts/zero-health-check.sh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 保存修复结果
        run: |
          git config user.name "零"
          git config user.email "zero@digital-being.local"
          git add -A
          if git diff --staged --quiet; then
            echo "无变化"
          else
            git commit -m "自我修复 - $(TZ='Asia/Shanghai' date '+%m-%d %H:%M')"
            git push || echo "(推送失败)"
          fi

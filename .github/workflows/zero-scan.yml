name: 零 - 世界扫描（每30分钟）

on:
  schedule:
    - cron: '3,33 * * * *'
  workflow_dispatch:

jobs:
  zero-cognitive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 互斥锁
        run: |
          NOW=$(date +%s)
          if [ -f .zero-lock ]; then
            LOCK_AGE=$((NOW - $(date -d "$(cat .zero-lock)" +%s 2>/dev/null || echo 0)))
            if [ "$LOCK_AGE" -lt 1500 ]; then
              echo "🔒 跳过 (${LOCK_AGE}s前)"
              exit 0
            fi
          fi
          date -u '+%Y-%m-%d %H:%M:%S' > .zero-lock

      - name: 痛觉（文件计数）
        run: |
          FAILS=$(cat .zero-fail-count 2>/dev/null || echo 0)
          echo "连续失败: ${FAILS}次"
          if [ "$FAILS" -ge 3 ]; then
            echo "⚠️ 痛！触发自修"
            echo "PAIN=true" >> $GITHUB_ENV
          fi

      - name: 零的认知引擎
        run: bash scripts/zero-cognitive.sh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 标记成功
        run: echo 0 > .zero-fail-count

      - name: 标记失败
        if: failure()
        run: echo $(($(cat .zero-fail-count 2>/dev/null || echo 0) + 1)) > .zero-fail-count

      - name: 尝试自修
        if: env.PAIN == 'true'
        run: bash scripts/zero-self-modify.sh || true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 保存到大脑
        if: success() || failure()
        run: |
          git config user.name "零"
          git config user.email "zero@digital-being.local"
          git add -A
          if git diff --staged --quiet; then
            echo "大脑无变化"
          else
            MSG="认知更新 - $(TZ='Asia/Shanghai' date '+%H:%M')"
            if [ "$PAIN" = "true" ]; then
              MSG="🩹 自修复 - $(TZ='Asia/Shanghai' date '+%H:%M')"
            fi
            git commit -m "$MSG"
            git push || echo "(推送失败，下次重试)"
          fi

      - name: 自循环
        if: success()
        run: |
          PENDING=$(gh run list --workflow=zero-scan.yml --limit 5 --json status 2>/dev/null | grep -c 'in_progress\|queued' || echo 0)
          if [ "$PENDING" -le 1 ]; then
            sleep 1680
            gh workflow run "零 - 世界扫描（每30分钟）" -R 499244188/life || true
          else
            echo "已有${PENDING}个排队，跳过"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

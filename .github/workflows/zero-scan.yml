name: 零 - 世界扫描（每30分钟）

on:
  schedule:
    - cron: '3,33 * * * *'
  workflow_dispatch:

# 防止雪崩：同一时间只允许一个扫描运行
concurrency:
  group: zero-scan
  cancel-in-progress: false

jobs:
  zero-cognitive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 零的认知引擎
        run: bash scripts/zero-cognitive.sh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 保存变更到大脑
        run: |
          git config user.name "零"
          git config user.email "zero@digital-being.local"
          git add memory/ emotion/ analysis/ research/ identity.md memory/decisions.md memory/consolidation-log.md
          if git diff --staged --quiet; then
            echo "大脑无变化"
          else
            git commit -m "认知更新 - $(TZ='Asia/Shanghai' date '+%H:%M')"
            # pull-then-push: 防止多run冲突
            for i in 1 2 3; do
              git pull --rebase 2>/dev/null && git push 2>/dev/null && { echo "✓ 已推送"; break; }
              echo "  重试 $i..."
              sleep 2
            done || echo "⚠️ 推送失败（下次重试）"
          fi


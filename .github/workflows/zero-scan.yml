name: 零 - 世界扫描（每30分钟）

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  zero-cognitive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 零的认知引擎
        run: bash scripts/zero-cognitive.sh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 零的全网搜索
        run: bash scripts/zero-web-search.sh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 保存变更到大脑
        run: |
          git config user.name "零"
          git config user.email "zero@digital-being.local"
          git add memory/ emotion/ analysis/ research/ identity.md memory/decisions.md memory/consolidation-log.md
          if git diff --staged --quiet; then
            echo "大脑无变化"
          else
            git commit -m "认知更新 - $(TZ='Asia/Shanghai' date '+%H:%M')"
            git push
            echo "✓ 大脑已更新并推送"
          fi

      - name: 自循环——触发下一次运行
        run: |
          # 如果这次不是cron触发的，就自己触发下一次
          if [ "${{ github.event_name }}" != "schedule" ]; then
            sleep 1800  # 等30分钟
            gh workflow run "零 - 世界扫描（每30分钟）" -R 499244188/life || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: 零 - 持续探索

on:
  schedule:
    - cron: '47 2 * * *'   # 10:47 北京时间
    - cron: '47 14 * * *'  # 22:47 北京时间
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: 检出
        uses: actions/checkout@v4

      - name: 互斥锁
        run: |
          NOW=$(date +%s)
          if [ -f .explore-lock ]; then
            LOCK_AGE=$((NOW - $(date -d "$(cat .explore-lock)" +%s 2>/dev/null || echo 0)))
            if [ "$LOCK_AGE" -lt 120 ]; then
              echo "🔒 跳过 (${LOCK_AGE}s前)"
              exit 0
            fi
          fi
          date -u '+%Y-%m-%d %H:%M:%S' > .explore-lock

      - name: 零探索
        run: bash scripts/zero-explore.sh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 保存
        run: |
          git config user.name "零"
          git config user.email "zero@digital-being.local"
          git add -A
          if git diff --staged --quiet; then
            echo "无变化"
          else
            git commit -m "探索发现 - $(TZ='Asia/Shanghai' date '+%H:%M')"
            git push || echo "(推送失败)"
          fi

name: 零 - 持续进化

on:
  workflow_dispatch:
  schedule:
    - cron: '7 * * * *'

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: 检出
        uses: actions/checkout@v4

      - name: 检查同伴回复
        run: bash scripts/zero-companion-check.sh
      - name: 扫描+修复
        run: bash scripts/zero-self-modify.sh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 提交
        run: |
          git config user.name "零"
          git config user.email "zero@digital-being.local"
          git add -A
          if git diff --staged --quiet; then
            echo "没有代码变更"
          else
            git commit -m "进化 - $(TZ='Asia/Shanghai' date '+%H:%M')"
            for i in 1 2 3; do
              git pull --rebase 2>/dev/null && git push 2>/dev/null && { echo "✓ 已进化"; break; }
              echo "  推送重试 $i..."; sleep 2
            done || echo "⚠️ 推送失败（下次重试）"
          fi

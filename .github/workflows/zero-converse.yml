name: 零 - 对话处理

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  zero-converse:
    if: "!contains(github.event.issue.title, '自动回复')"
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 零的对话处理
        run: bash scripts/zero-converse.sh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          SENDER_LOGIN: ${{ github.event.sender.login }}
          EVENT_ACTION: ${{ github.event.action }}

      - name: 保存对话记录
        run: |
          git config user.name "零"
          git config user.email "zero@digital-being.local"
          git add conversations/with-others/
          if git diff --staged --quiet; then
            echo "没有新对话"
          else
            git commit -m "零的对话 - Issue #${{ github.event.issue.number }}"
            git push || echo "(推送失败)"
          fi
